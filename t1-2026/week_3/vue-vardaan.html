<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vue 2 Concept Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.14/dist/vue.js"></script>
    <style>
        /* Exact same CSS as Vanilla JS */
        body { font-family: 'Segoe UI', Tahoma, Geneva, sans-serif; padding: 20px; max-width: 500px; margin: 0 auto; background: #f4f7f6; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 8px 16px; background: #41b883; color: white; border: none; border-radius: 4px; cursor: pointer; } /* Vue Green! */
        ul { list-style-type: none; padding: 0; }
        li { padding: 10px; background: #eee; margin-bottom: 5px; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        li:hover { background: #e0e0e0; }
        .mastered { text-decoration: line-through; background: #d5f5e3; color: #27ae60; }
    </style>
</head>
<body>

    <div id="app" class="card">
        <h2>MAD2 Concept Tracker</h2>
        
        <h3>Mastered: {{ masteredCount }} / {{ concepts.length }}</h3>
        
        <div class="input-group">
            <input v-model="newConcept" @keyup.enter="addConcept" placeholder="Add a concept...">
            <button @click="addConcept">Add</button>
        </div>

        <ul>
            <li v-for="concept in concepts" 
                :class="{ mastered: concept.mastered }" 
                @click="concept.mastered = !concept.mastered">
                {{ concept.name }}
            </li>
        </ul>
    </div>

    <script>
        new Vue({
            el: '#app',
            data: {
                newConcept: '',
                concepts: [
                    { name: "HTTP Statelessness", mastered: false },
                    { name: "DOM Manipulation", mastered: false }
                ]
            },
            computed: {
                // Vue automatically recalculates this ONLY when 'concepts' changes
                masteredCount() {
                    return this.concepts.filter(c => c.mastered).length;
                }
            },
            methods: {
                addConcept() {
                    if (this.newConcept.trim() !== '') {
                        this.concepts.push({ name: this.newConcept.trim(), mastered: false });
                        this.newConcept = ''; // Vue auto-clears the input box!
                    }
                }
            }
        });
    </script>
</body>
</html>
